<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài giảng BJT - Trường kỹ thuật Phenikaa</title>
    <!-- Tích hợp Tailwind CSS cho giao diện hiện đại -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tích hợp React và ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Tích hợp Babel để biên dịch mã JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tích hợp Lucide Icons cho các biểu tượng kỹ thuật -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes flowUp {
            from { transform: translateY(0); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            to { transform: translateY(-260px); opacity: 0; }
        }
        .animate-fadeIn {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #002d72;
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Thành phần hiển thị Icon an toàn
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // Mô phỏng dòng điện hạt dẫn
        const ElectronFlow = ({ density, speed }) => {
            if (density <= 0) return null;
            const particleCount = Math.floor(density * 15);
            return (
                <div className="absolute inset-0 overflow-hidden pointer-events-none">
                    {[...Array(particleCount)].map((_, i) => (
                        <div
                            key={i}
                            className="absolute bg-yellow-300 rounded-full blur-[1px] shadow-[0_0_8px_#fef08a]"
                            style={{
                                width: '4px',
                                height: '4px',
                                left: `${10 + Math.random() * 80}%`,
                                bottom: '-10px',
                                animation: `flowUp ${2.5 / speed}s linear infinite`,
                                animationDelay: `${Math.random() * 2}s`
                            }}
                        />
                    ))}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('overview');
            const [bjtType, setBjtType] = useState('NPN');
            const [vbe, setVbe] = useState(0.0);
            const [isLedOn, setIsLedOn] = useState(false);
            const [inputSignal, setInputSignal] = useState(1);

            const getBjtColors = () => {
                return bjtType === 'NPN' 
                    ? { main: 'bg-blue-800', sub: 'bg-red-600', accent: '#1d4ed8' }
                    : { main: 'bg-red-700', sub: 'bg-blue-600', accent: '#b91c1c' };
            };

            const colors = getBjtColors();

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header chuẩn nhận diện thương hiệu */}
                    <header className="bg-white border-b sticky top-0 z-50 shadow-sm">
                        <div className="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <img 
                                    src="Logo_Trường kỹ thuật.png" 
                                    alt="Logo Phenikaa" 
                                    className="h-16 object-contain" 
                                    onError={(e) => { e.target.src = 'https://via.placeholder.com/200x80?text=Phenikaa+University'; }} 
                                />
                                <div className="h-12 w-px bg-slate-200 hidden md:block"></div>
                                <div className="text-center md:text-left">
                                    <h1 className="text-lg font-extrabold text-[#002d72] uppercase leading-tight tracking-tight">Trường kỹ thuật Phenikaa</h1>
                                    <p className="text-sm font-semibold text-blue-600 uppercase tracking-widest">Đại học Phenikaa</p>
                                </div>
                            </div>
                            <div className="text-center md:text-right border-t md:border-t-0 pt-2 md:pt-0">
                                <span className="text-[10px] text-slate-400 uppercase font-black tracking-widest block">Giảng viên hướng dẫn</span>
                                <p className="text-base font-extrabold text-slate-900">Ths. Đinh Văn Nam</p>
                            </div>
                        </div>
                    </header>

                    {/* Banner Tiêu đề */}
                    <div className="bg-[#002d72] text-white py-12 px-4 text-center relative overflow-hidden">
                        <div className="absolute inset-0 opacity-5">
                            <svg width="100%" height="100%"><pattern id="p" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="white"/></pattern><rect width="100%" height="100%" fill="url(#p)" /></svg>
                        </div>
                        <h2 className="text-3xl md:text-5xl font-black mb-4 uppercase tracking-tighter italic">Tranzito Lưỡng cực (BJT)</h2>
                        <p className="text-blue-100 max-w-2xl mx-auto font-medium opacity-90 tracking-wide text-sm md:text-base">Mô phỏng tương tác và học liệu điện tử dành cho ngành Điện - Điện tử</p>
                    </div>

                    {/* Thanh điều hướng */}
                    <nav className="bg-white border-b shadow-md sticky top-[97px] z-40">
                        <div className="max-w-6xl mx-auto flex overflow-x-auto no-scrollbar justify-start md:justify-center">
                            {[
                                { id: 'overview', label: 'Tổng quan', icon: 'book-open' },
                                { id: 'structure', label: 'Cấu tạo & Ký hiệu', icon: 'cpu' },
                                { id: 'operation', label: 'Nguyên lý', icon: 'activity' },
                                { id: 'application', label: 'Ứng dụng', icon: 'lightbulb' }
                            ].map((tab) => (
                                <button 
                                    key={tab.id} 
                                    onClick={() => setActiveTab(tab.id)} 
                                    className={`flex items-center gap-2 px-8 py-5 transition-all whitespace-nowrap relative font-black text-xs uppercase tracking-widest ${activeTab === tab.id ? 'text-blue-800' : 'text-slate-400 hover:text-slate-600 hover:bg-slate-50'}`}
                                >
                                    <Icon name={tab.icon} size={18} />
                                    {tab.label}
                                    {activeTab === tab.id && <div className="absolute bottom-0 left-0 w-full h-1.5 bg-blue-800" />}
                                </button>
                            ))}
                        </div>
                    </nav>

                    {/* Nội dung chính */}
                    <main className="flex-grow max-w-6xl mx-auto w-full p-4 md:p-8">
                        <div className="bg-white rounded-[2rem] shadow-xl border border-slate-100 overflow-hidden min-h-[600px] flex flex-col p-6 md:p-12 animate-fadeIn">
                            
                            {activeTab === 'overview' && (
                                <div className="space-y-8">
                                    <div className="flex items-center gap-4">
                                        <div className="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg rotate-3">
                                            <Icon name="info" size={32} />
                                        </div>
                                        <h2 className="text-3xl font-black text-slate-900 uppercase">1. Giới thiệu chung</h2>
                                    </div>
                                    <p className="text-xl text-slate-600 leading-relaxed font-medium">
                                        Bipolar Junction Transistor (BJT) là một linh kiện bán dẫn có 3 cực, có khả năng điều khiển dòng điện chạy qua hai cực đầu ra bằng một dòng điện nhỏ hơn tại cực đầu vào. 
                                    </p>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="p-8 rounded-3xl bg-blue-50 border border-blue-100 shadow-sm hover:shadow-md transition-all">
                                            <Icon name="waves" className="text-blue-700 mb-4" />
                                            <h4 className="text-blue-900 font-extrabold mb-2 text-lg uppercase">Khuếch đại</h4>
                                            <p className="text-sm text-slate-600">Phóng đại biên độ tín hiệu yếu thành tín hiệu mạnh hơn.</p>
                                        </div>
                                        <div className="p-8 rounded-3xl bg-yellow-50 border border-yellow-100 shadow-sm hover:shadow-md transition-all">
                                            <Icon name="zap" className="text-yellow-700 mb-4" />
                                            <h4 className="text-yellow-900 font-extrabold mb-2 text-lg uppercase">Đóng ngắt</h4>
                                            <p className="text-sm text-slate-600">Sử dụng trong mạch số như một khóa điện tử tốc độ cao.</p>
                                        </div>
                                        <div className="p-8 rounded-3xl bg-indigo-50 border border-indigo-100 shadow-sm hover:shadow-md transition-all">
                                            <Icon name="settings" className="text-indigo-700 mb-4" />
                                            <h4 className="text-indigo-900 font-extrabold mb-2 text-lg uppercase">Điều khiển</h4>
                                            <p className="text-sm text-slate-600">Điều tiết công suất cho tải dựa trên dòng điều khiển.</p>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'structure' && (
                                <div className="space-y-12">
                                    <div className="flex items-center gap-4">
                                        <div className="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg">
                                            <Icon name="cpu" size={32} />
                                        </div>
                                        <h2 className="text-3xl font-black text-slate-900 uppercase">2. Cấu tạo & Ký hiệu</h2>
                                    </div>
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-12">
                                        {/* Mô hình vật lý */}
                                        <div className="bg-slate-50 p-8 rounded-[2.5rem] border border-slate-200 flex flex-col items-center">
                                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">Mô hình lớp bán dẫn</span>
                                            <div className="relative w-48 h-72 bg-white rounded-2xl p-4 shadow-xl border border-slate-200 flex flex-col">
                                                <div className="w-full h-full flex flex-col border-4 border-slate-900 rounded-lg overflow-hidden">
                                                    <div className={`flex-[1.2] flex items-center justify-center font-black text-2xl text-white transition-colors duration-500 ${colors.main}`}>
                                                        {bjtType === 'NPN' ? 'N' : 'P'}
                                                    </div>
                                                    <div className="h-1 bg-slate-100 opacity-30"></div>
                                                    <div className={`h-10 flex items-center justify-center font-black text-white text-lg border-y-4 border-slate-900 transition-colors duration-500 ${colors.sub}`}>
                                                        {bjtType === 'NPN' ? 'P' : 'N'}
                                                    </div>
                                                    <div className="h-1 bg-slate-100 opacity-30"></div>
                                                    <div className={`flex-1 flex items-center justify-center font-black text-2xl text-white transition-colors duration-500 ${colors.main}`}>
                                                        {bjtType === 'NPN' ? 'N' : 'P'}
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="mt-8 flex gap-3 p-1 bg-slate-200 rounded-xl">
                                                {['NPN', 'PNP'].map(type => (
                                                    <button key={type} onClick={() => setBjtType(type)} className={`px-8 py-2 rounded-lg text-xs font-black uppercase transition-all ${bjtType === type ? 'bg-blue-900 text-white shadow-md' : 'text-slate-500 hover:text-slate-700'}`}>
                                                        {type}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Ký hiệu chuẩn xác */}
                                        <div className="bg-white p-8 rounded-[2.5rem] border-2 border-slate-100 shadow-xl flex flex-col items-center justify-center">
                                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-8">Ký hiệu sơ đồ chuẩn IEC</span>
                                            <svg width="220" height="220" viewBox="0 0 100 100">
                                                <circle cx="50" cy="50" r="45" fill="none" stroke="#002d72" strokeWidth="2.5" />
                                                <line x1="40" y1="33" x2="40" y2="67" stroke="#0f172a" strokeWidth="6" strokeLinecap="square" />
                                                <line x1="12" y1="50" x2="40" y2="50" stroke="#0f172a" strokeWidth="3" />
                                                <line x1="40" y1="42" x2="72" y2="22" stroke="#0f172a" strokeWidth="3" />
                                                <line x1="40" y1="58" x2="72" y2="78" stroke="#0f172a" strokeWidth="3" />
                                                
                                                {/* Mũi tên NPN Chuẩn: Hướng RA (Out) trên chân E */}
                                                {bjtType === 'NPN' ? (
                                                    <path d="M 64 74 L 75 79.5 L 61 83 Z" fill="#1e40af" stroke="#1e40af" strokeWidth="1" strokeLinejoin="round" />
                                                ) : (
                                                    /* Mũi tên PNP Chuẩn: Hướng VÀO (In) trên chân E */
                                                    <path d="M 43 61 L 53 60 L 50 69 Z" fill="#b91c1c" stroke="#b91c1c" strokeWidth="1" strokeLinejoin="round" />
                                                )}
                                                
                                                <text x="6" y="46" fontSize="8" fontWeight="900" fill="#64748b" fontStyle="italic">B</text>
                                                <text x="75" y="22" fontSize="8" fontWeight="900" fill="#64748b" fontStyle="italic">C</text>
                                                <text x="75" y="85" fontSize="8" fontWeight="900" fill="#64748b" fontStyle="italic">E</text>
                                            </svg>
                                            <p className="mt-8 text-xs font-bold text-slate-400 italic">
                                                {bjtType === 'NPN' ? 'Mũi tên hướng ra cực Emitter' : 'Mũi tên hướng vào phía Base'}
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'operation' && (
                                <div className="space-y-10">
                                    <div className="flex items-center gap-4">
                                        <div className="w-14 h-14 bg-green-600 rounded-2xl flex items-center justify-center text-white shadow-lg rotate-6">
                                            <Icon name="activity" size={32} />
                                        </div>
                                        <h2 className="text-3xl font-black text-slate-900 uppercase">3. Nguyên lý hoạt động</h2>
                                    </div>
                                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                                        <div className="lg:col-span-4 bg-slate-50 p-8 rounded-3xl border border-slate-200 flex flex-col justify-center">
                                            <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">Điều khiển điện áp Vbe</h4>
                                            <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-inner mb-8">
                                                <p className="text-[10px] text-slate-400 font-bold mb-1 uppercase">Giá trị thực tế</p>
                                                <p className="text-4xl font-black text-blue-900 font-mono tracking-tighter">{vbe.toFixed(2)}V</p>
                                            </div>
                                            <input 
                                                type="range" 
                                                min="0" 
                                                max="1.0" 
                                                step="0.01" 
                                                value={vbe} 
                                                onChange={(e)=>setVbe(parseFloat(e.target.value))} 
                                                className="w-full h-3 bg-slate-200 rounded-full appearance-none cursor-pointer mb-6" 
                                            />
                                            <div className={`p-4 rounded-xl border-2 transition-all font-bold text-xs uppercase text-center ${vbe < 0.6 ? 'bg-slate-200 border-slate-300 text-slate-500' : vbe < 0.85 ? 'bg-green-100 border-green-500 text-green-700 shadow-md' : 'bg-red-100 border-red-500 text-red-700 shadow-md'}`}>
                                                {vbe < 0.6 ? 'Trạng thái khóa' : vbe < 0.85 ? 'Khuếch đại' : 'Bão hòa'}
                                            </div>
                                        </div>
                                        <div className="lg:col-span-8 bg-slate-900 rounded-[3rem] p-10 flex flex-col items-center justify-center relative min-h-[450px] shadow-2xl">
                                            <div className="absolute top-6 left-8 flex items-center gap-2">
                                                <div className={`w-2 h-2 rounded-full ${vbe >= 0.6 ? 'bg-green-500 animate-pulse' : 'bg-red-500'}`}></div>
                                                <span className="text-[10px] text-slate-500 font-black uppercase tracking-widest">Physics Simulation</span>
                                            </div>
                                            <div className="relative w-56 h-80 border-2 border-white/20 rounded-[2.5rem] overflow-hidden bg-black/50 shadow-inner backdrop-blur-sm">
                                                <div className="absolute bottom-0 w-full h-[35%] bg-blue-900/10 border-t border-white/5 flex items-center justify-center text-white/10 text-[8px] font-black uppercase tracking-widest">Emitter</div>
                                                <div className="absolute top-[35%] w-full h-12 bg-red-600/20 border-y border-white/10 flex items-center justify-center text-red-400/40 text-[8px] font-black uppercase">Base</div>
                                                <div className="absolute top-0 w-full h-[35%] bg-blue-900/10 border-b border-white/5 flex items-center justify-center text-white/10 text-[8px] font-black uppercase tracking-widest">Collector</div>
                                                
                                                <ElectronFlow density={vbe < 0.6 ? 0 : vbe < 0.85 ? 2.5 : 5} speed={vbe < 0.6 ? 0 : vbe < 0.85 ? 1.5 : 3.5} />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'application' && (
                                <div className="space-y-12">
                                    <div className="flex items-center gap-4">
                                        <div className="w-14 h-14 bg-yellow-500 rounded-2xl flex items-center justify-center text-white shadow-lg -rotate-6">
                                            <Icon name="lightbulb" size={32} />
                                        </div>
                                        <h2 className="text-3xl font-black text-slate-900 uppercase">4. Ứng dụng & Demo</h2>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        {/* Demo Công tắc */}
                                        <div className="bg-slate-50 p-8 rounded-[2.5rem] border border-slate-200 flex flex-col">
                                            <h4 className="text-xl font-black text-slate-900 mb-2 uppercase">Công tắc điện tử</h4>
                                            <div className="bg-slate-900 rounded-[2rem] p-10 flex flex-col items-center flex-grow mt-4 shadow-xl">
                                                <div className={`w-24 h-24 rounded-full transition-all duration-300 flex items-center justify-center mb-10 border-4 ${isLedOn ? 'bg-yellow-400 shadow-[0_0_80px_#facc15] border-yellow-200 scale-110' : 'bg-slate-800 border-slate-700'}`}>
                                                    <Icon name="zap" size={48} className={isLedOn ? 'text-white animate-pulse' : 'text-slate-600'} />
                                                </div>
                                                <button 
                                                    onClick={() => setIsLedOn(!isLedOn)} 
                                                    className={`px-12 py-4 rounded-2xl font-black text-sm uppercase tracking-widest transition-all shadow-lg hover:-translate-y-1 active:translate-y-0.5 ${isLedOn ? 'bg-red-500 text-white shadow-red-200' : 'bg-blue-600 text-white shadow-blue-200'}`}
                                                >
                                                    {isLedOn ? 'Tắt dòng Base' : 'Kích dòng Base'}
                                                </button>
                                            </div>
                                        </div>
                                        {/* Demo Khuếch đại */}
                                        <div className="bg-slate-50 p-8 rounded-[2.5rem] border border-slate-200 flex flex-col">
                                            <h4 className="text-xl font-black text-slate-900 mb-2 uppercase">Khuếch đại tín hiệu</h4>
                                            <div className="bg-slate-900 rounded-[2rem] p-8 flex flex-col flex-grow mt-4 shadow-xl">
                                                <div className="h-44 bg-black/60 rounded-2xl border border-white/5 relative overflow-hidden flex items-center mb-10 px-6 shadow-inner">
                                                    {[...Array(22)].map((_, i) => (
                                                        <div 
                                                            key={i} 
                                                            className="w-2 bg-blue-500 rounded-full animate-bounce shadow-[0_0_15px_#3b82f6] mx-auto" 
                                                            style={{ 
                                                                height: `${25 + (Math.sin(i * 0.5) * 25 * inputSignal)}px`, 
                                                                animationDelay: `${i * 0.1}s`,
                                                                opacity: 0.4 + (inputSignal / 4)
                                                            }}
                                                        ></div>
                                                    ))}
                                                    <span className="absolute bottom-3 right-4 text-[8px] font-black text-blue-400/40 uppercase tracking-widest italic">Gain Scope Output</span>
                                                </div>
                                                <div className="space-y-4">
                                                    <div className="flex justify-between text-[10px] text-white/50 font-bold uppercase tracking-widest">
                                                        <span>Âm lượng vào</span>
                                                        <span className="text-indigo-400 font-black">Hệ số Gain (hFE)</span>
                                                    </div>
                                                    <input 
                                                        type="range" 
                                                        min="0.3" 
                                                        max="2.5" 
                                                        step="0.1" 
                                                        value={inputSignal} 
                                                        onChange={(e)=>setInputSignal(parseFloat(e.target.value))} 
                                                        className="w-full h-2 bg-slate-800 rounded-full appearance-none cursor-pointer accent-indigo-500" 
                                                    />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Footer chuẩn nhận diện */}
                    <footer className="bg-white border-t py-16 px-4 shadow-inner mt-12">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-12 text-center md:text-right">
                            <div className="flex items-center gap-8">
                                <div className="w-24 h-24 bg-[#002d72] rounded-[2.5rem] flex items-center justify-center text-white shadow-2xl transition-transform hover:-rotate-12">
                                    <Icon name="graduation-cap" size={48} />
                                </div>
                                <div className="text-left">
                                    <p className="text-[10px] text-blue-600 font-black uppercase tracking-[0.5em] mb-2">Học liệu Phenikaa</p>
                                    <h3 className="text-3xl font-black text-slate-900 tracking-tighter">Khoa Điện - Điện tử</h3>
                                    <p className="text-base font-bold text-slate-500 uppercase tracking-widest mt-1">Trường kỹ thuật Phenikaa</p>
                                </div>
                            </div>
                            <div className="space-y-4">
                                <div className="flex items-center justify-center md:justify-end gap-2 text-blue-900 font-black">
                                    <Icon name="copyright" size={18} />
                                    <span className="uppercase tracking-widest text-sm font-black">Bản quyền 2026</span>
                                </div>
                                <p className="text-sm text-slate-900 font-black uppercase tracking-tight">Trường kỹ thuật Phenikaa, Đại học Phenikaa</p>
